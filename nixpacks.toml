# Nixpacks build configuration for Coolify deployment.
#
# At build time we DO NOT run `fetch-sheet-data.js` — locales live on a
# persistent volume mounted at /app/dist/locales and are populated by the
# container entrypoint (scripts/start.sh) on first boot.
#
# Required Coolify env vars:
#   - VITE_CODE
#   - VITE_APARTMENT_NUMBER
#   - VITE_LANGUAGES                e.g. "en,es,fr,it"
#   - GOOGLE_SHEET_ID
#   - GOOGLE_SERVICE_ACCOUNT_KEY    (full JSON as a single line)
#
# Required Coolify volume mount:
#   - /app/dist/locales            (persistent storage)

[variables]
# Vite 8 / rolldown require Node >= 22.12. Pin to 24 to avoid the
# "Node 22.11" version Coolify picks for `NIXPACKS_NODE_VERSION=22`.
NIXPACKS_NODE_VERSION = "24"

[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
# Use `npm install` (not `npm ci`) to work around the npm optional-deps
# bug — package-lock.json generated on macOS does not record
# `@rolldown/binding-linux-x64-gnu`, so `npm ci` skips it on Linux and
# the build fails with "Cannot find native binding".
# See: https://github.com/npm/cli/issues/4828
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "sh scripts/start.sh"
